<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rekap Laporan Mesin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app-shell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-brand">
        <img src="assets/logo.png" alt="Savoria Kreasi Rasa" />
        <div>
          <p class="sidebar-brand-name">Savoria</p>
          <p class="sidebar-brand-sub">Maintenance app</p>
        </div>
      </div>
    </div>
    <div class="sidebar-nav">
      <a href="index.html" class="sidebar-link">Dashboard</a>
      <a href="laporan.html" class="sidebar-link">Input laporan</a>
      <a href="rekap.html" class="sidebar-link active">Rekap laporan</a>
      <a href="pm.html" class="sidebar-link">Checklist PM</a>
    </div>
  </aside>

  <div class="app-main">

    <div class="topbar">
      <div class="topbar-inner">
        <div class="topbar-logo">
          <img src="assets/logo.png" alt="Savoria Kreasi Rasa" />
        </div>
        <div class="topbar-text">
          <span class="topbar-title">Rekap Laporan</span>
          <span class="topbar-sub">Riwayat laporan mesin &amp; export Excel</span>
        </div>
        <button type="button" class="menu-btn" id="btn-menu" aria-label="Buka menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>

    <!-- GERBANG PASSWORD -->
    <main class="wrap gate-wrap" id="gate-wrap">
      <div class="gate-card">
        <p class="gate-title">Halaman terkunci</p>
        <p class="gate-sub">Masukkan password untuk melihat rekap laporan.</p>
        <form id="gate-form">
          <input type="password" id="gate-input" class="gate-input" placeholder="Password" autocomplete="off" required />
          <p class="gate-error" id="gate-error" hidden></p>
          <button type="submit" class="btn-submit">Buka</button>
        </form>
      </div>
    </main>

    <!-- ISI REKAP -->
    <main class="wrap wrap-wide" id="rekap-wrap" hidden>

      <section class="filter-card">
        <div class="filter-row">
          <div class="filter-field">
            <label class="field-label" for="f-tanggal-dari">Dari tanggal</label>
            <input type="date" id="f-tanggal-dari" />
          </div>
          <div class="filter-field">
            <label class="field-label" for="f-tanggal-sampai">Sampai tanggal</label>
            <input type="date" id="f-tanggal-sampai" />
          </div>
          <div class="filter-field">
            <label class="field-label" for="f-area">Area</label>
            <select id="f-area">
              <option value="">Semua area</option>
            </select>
          </div>
          <div class="filter-field">
            <label class="field-label" for="f-status">Status</label>
            <select id="f-status">
              <option value="">Semua status</option>
              <option value="Running">Running</option>
              <option value="Standby">Standby</option>
              <option value="Maintenance">Maintenance</option>
              <option value="Breakdown">Breakdown</option>
            </select>
          </div>
        </div>
        <div class="filter-actions">
          <button type="button" id="btn-filter" class="btn-secondary btn-inline">Terapkan filter</button>
          <button type="button" id="btn-reset" class="btn-link-btn">Reset</button>
        </div>
      </section>

      <div class="rekap-toolbar">
        <p class="rekap-count" id="rekap-count">Memuat data…</p>
        <button type="button" id="btn-export" class="btn-export" disabled>⬇ Export ke Excel</button>
      </div>

      <p class="form-error" id="rekap-error" hidden></p>

      <div class="table-wrap">
        <table id="rekap-table">
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Jam</th>
              <th>Shift</th>
              <th>Area</th>
              <th>Mesin</th>
              <th>Equipment</th>
              <th>Status</th>
              <th>Deskripsi</th>
              <th>PIC</th>
              <th>Foto</th>
            </tr>
          </thead>
          <tbody id="rekap-tbody">
            <tr><td colspan="10" class="table-empty">Memuat data…</td></tr>
          </tbody>
        </table>
      </div>

    </main>

  </div>

</div>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<script src="js/sidebar.js"></script>
<script type="module" src="js/rekap.js"></script>
</body>
</html>
