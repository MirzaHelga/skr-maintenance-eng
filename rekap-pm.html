<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rekap Checklist PM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="rekap-pm" data-allow="spv,superadmin">

<div class="app-shell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-brand">
        <img src="assets/logo.png" alt="Savoria Kreasi Rasa" />
        <div>
          <p class="sidebar-brand-name">Savoria</p>
          <p class="sidebar-brand-sub">Maintenance app</p>
        </div>
      </div>
    </div>
    <div class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link" data-role="spv,superadmin">Dashboard</a>
      <a href="laporan.html" class="sidebar-link" data-role="all">Input laporan</a>
      <a href="rekap.html" class="sidebar-link" data-role="spv,superadmin">Rekap laporan</a>
      <a href="pm.html" class="sidebar-link" data-role="all">Checklist PM</a>
      <a href="rekap-pm.html" class="sidebar-link active" data-role="spv,superadmin">Rekap Checklist PM</a>
      <a href="draft.html" class="sidebar-link" data-role="spv,superadmin">Draft</a>
      <a href="kelola-user.html" class="sidebar-link" data-role="superadmin">Kelola User</a>
    </div>
  </aside>

  <div class="app-main">

    <div class="topbar">
      <div class="topbar-inner">
        <div class="topbar-logo">
          <img src="assets/logo.png" alt="Savoria Kreasi Rasa" />
        </div>
        <div class="topbar-text">
          <span class="topbar-title">Rekap Checklist PM</span>
          <span class="topbar-sub">Riwayat checklist preventive maintenance</span>
        </div>
        <button type="button" class="menu-btn" id="btn-menu" aria-label="Buka menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>

    <!-- ISI REKAP (halaman ini sudah dijaga role SPV lewat auth.js) -->
    <main class="wrap wrap-wide" id="rekap-wrap">

      <section class="filter-card">
        <div class="filter-row">
          <div class="filter-field">
            <label class="field-label" for="f-tanggal-dari">Dari tanggal</label>
            <input type="date" id="f-tanggal-dari" />
          </div>
          <div class="filter-field">
            <label class="field-label" for="f-tanggal-sampai">Sampai tanggal</label>
            <input type="date" id="f-tanggal-sampai" />
          </div>
          <div class="filter-field">
            <label class="field-label" for="f-checklist">Checklist</label>
            <select id="f-checklist">
              <option value="">Semua checklist</option>
            </select>
          </div>
          <div class="filter-field">
            <label class="field-label" for="f-periode">Periode</label>
            <select id="f-periode">
              <option value="">Semua periode</option>
            </select>
          </div>
        </div>
        <div class="filter-actions">
          <button type="button" id="btn-filter" class="btn-secondary btn-inline">Terapkan filter</button>
          <button type="button" id="btn-reset" class="btn-link-btn">Reset</button>
        </div>
      </section>

      <div class="rekap-toolbar">
        <p class="rekap-count" id="rekap-count">Memuat data…</p>
        <button type="button" id="btn-export" class="btn-export" disabled>⬇ Export ke Excel</button>
      </div>

      <p class="form-error" id="rekap-error" hidden></p>

      <div class="table-wrap">
        <table id="rekap-table">
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Checklist</th>
              <th>Periode</th>
              <th>Equipment</th>
              <th>Area</th>
              <th>Bulan/Tahun</th>
              <th>Diperiksa (OPR)</th>
              <th>Diperiksa (SPV)</th>
              <th>Foto</th>
              <th>Review</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="rekap-tbody">
            <tr><td colspan="11" class="table-empty">Memuat data…</td></tr>
          </tbody>
        </table>
      </div>

    </main>

  </div>

</div>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- DETAIL CHECKLIST -->
<div class="pm-detail-overlay" id="pm-detail-overlay" hidden>
  <div class="pm-detail-card">
    <button type="button" class="pm-detail-close" id="pm-detail-close" aria-label="Tutup">&times;</button>
    <p class="pm-detail-title" id="pm-detail-title"></p>
    <p class="pm-detail-sub" id="pm-detail-sub"></p>
    <div class="pm-detail-meta" id="pm-detail-meta"></div>
    <div class="pm-detail-body" id="pm-detail-body"></div>
    <div class="pm-detail-foto" id="pm-detail-foto"></div>
    <div class="pm-detail-catatan" id="pm-detail-catatan"></div>
  </div>
</div>

<script src="js/sidebar.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/rekap-pm.js"></script>
</body>
</html>
